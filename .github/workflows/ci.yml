name: Code Quality
on: [push]
jobs:

  ruff-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --only-group ci
      - run: uv run ruff check .

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --frozen --only-group ci
      - run: uv run ty check

  tests:
    runs-on: ubuntu-latest
    needs: [ruff-lint, type-check]
    steps:
      - uses: actions/checkout@v6
      - name: Setup environment file
        run: |
              cp config/env.example config/.env
              echo "Created config/.env"
      - name: Build the image
        run: docker compose build
      - name: Run tests
        run: docker compose -f docker-compose-ci.yml run api pytest --cov=. --cov-fail-under=85

  push-to-gar:
    runs-on: ubuntu-latest
    needs: tests
    if: github.ref == 'refs/heads/master'
    steps:
    - name: Check out repo
      uses: actions/checkout@v6

    - name: Set image tag
      run: |
        IMAGE_TAG="${{ secrets.GCLOUD_REGION }}-docker.pkg.dev/${{ secrets.GCLOUD_PROJECT_ID }}/${{ secrets.GCLOUD_REPOSITORY }}/cookbook-api:${{ github.sha }}"
        echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

    - name: Google Cloud Auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: "${{ secrets.GC_IMAGE_MANAGER_KEY }}"

    - name: Set up google cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Configure Docker for GAR
      run: gcloud auth configure-docker ${{ secrets.GCLOUD_REGION }}-docker.pkg.dev --quiet

    - name: Build and Push image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_TAG}}

