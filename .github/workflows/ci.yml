name: Code Quality
on: [push]
jobs:
  install-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install the project
        run: uv sync --group ci

  ruff-lint:
    runs-on: ubuntu-latest
    needs: [install-dev]
    steps:
      - uses: actions/checkout@v6
      - run: uv ruff check .
  type-check:
    runs-on: ubuntu-latest
    needs: [install-dev]
    steps:
      - uses: actions/checkout@v6
      - run: uv run ty check

  tests:
    runs-on: ubuntu-latest
    needs: [ruff-lint, type-check]
    steps:
      - uses: actions/checkout@v6
      - name: Build the image
        run: docker compose build
      - name: Run tests
        run: docker-compose -f docker-compose-ci.yml run api pytest .
